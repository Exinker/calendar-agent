services:
  postgres:
    image: postgres:16-alpine
    container_name: calendar_bot_postgres
    environment:
      POSTGRES_DB: calendar_bot
      POSTGRES_USER: bot_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bot_password_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot_user -d calendar_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: