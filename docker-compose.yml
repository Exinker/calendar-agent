services:
  postgres:
    image: postgres:16-alpine
    container_name: calendar_bot_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-calendar_bot}
      POSTGRES_USER: ${POSTGRES_USER:-bot_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bot_password_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bot_user} -d ${POSTGRES_DB:-calendar_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: